<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title>Kontrol Sistemleri Soru Havuzu</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      /* Tarayıcının varsayılan kenar boşluklarını sıfırlayalım ki tam ekran görünsün */
      body { margin: 0; padding: 0; background-color: #0d1117; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
// ==========================================
// REACT BAĞLANTILARI
// ==========================================
// "import { useState } from 'react';" yerine HTML'de bu yöntemi kullanıyoruz:
const { useState } = React;

// ==========================================
// CLAUDE'UN YAZDIĞI KOD (DÜZENLENMİŞ)
// ==========================================

const TOPICS = [
  { id: "all", label: "Tümü" },
  { id: "blok", label: "Blok Diyagram" },
  { id: "mason", label: "Mason / SFG" },
  { id: "laplace", label: "Laplace" },
  { id: "lineer", label: "Doğrusallaştırma" },
  { id: "durum", label: "Durum Uzayı" },
  { id: "motor", label: "DC Motor" },
  { id: "duyar", label: "Duyarlılık" },
  { id: "matlab", label: "MATLAB" },
];

// ── SVG helpers ──────────────────────────────────────────────────────────────
const ArrowMarker = () => (
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a0c4ff" />
    </marker>
  </defs>
);

function SvgSeries() {
  return (
    <svg viewBox="0 0 380 70" width="380" height="70" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      {/* R */}
      <text x="8" y="38" fill="#a0c4ff" fontSize="13" fontFamily="monospace">R(s)</text>
      <line x1="42" y1="35" x2="68" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* G1 block */}
      <rect x="70" y="22" width="60" height="26" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="100" y="39" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₁(s)</text>
      <line x1="130" y1="35" x2="156" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* G2 block */}
      <rect x="158" y="22" width="60" height="26" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="188" y="39" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₂(s)</text>
      <line x1="218" y1="35" x2="244" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* = */}
      <text x="248" y="39" fill="#94a3b8" fontSize="13">≡</text>
      <line x1="264" y1="35" x2="278" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* Equivalent block */}
      <rect x="280" y="22" width="72" height="26" rx="3" fill="none" stroke="#7dd3fc" strokeWidth="1.5" />
      <text x="316" y="39" fill="#7dd3fc" fontSize="11" fontFamily="monospace" textAnchor="middle">G₁(s)G₂(s)</text>
      <line x1="352" y1="35" x2="372" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <text x="373" y="39" fill="#a0c4ff" fontSize="13" fontFamily="monospace">Y</text>
    </svg>
  );
}

function SvgParallel() {
  return (
    <svg viewBox="0 0 380 100" width="380" height="100" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      <text x="4" y="53" fill="#a0c4ff" fontSize="13" fontFamily="monospace">R(s)</text>
      {/* branch point */}
      <line x1="42" y1="50" x2="70" y2="50" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <circle cx="70" cy="50" r="3" fill="#a0c4ff" />
      {/* upper branch */}
      <line x1="70" y1="50" x2="70" y2="22" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="70" y1="22" x2="90" y2="22" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="92" y="10" width="60" height="24" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="122" y="26" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₁(s)</text>
      <line x1="152" y1="22" x2="188" y2="22" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="188" y1="22" x2="188" y2="44" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* lower branch */}
      <line x1="70" y1="50" x2="70" y2="78" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="70" y1="78" x2="90" y2="78" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="92" y="66" width="60" height="24" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="122" y="82" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₂(s)</text>
      <line x1="152" y1="78" x2="188" y2="78" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="188" y1="78" x2="188" y2="56" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* sum junction */}
      <circle cx="192" cy="50" r="9" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="192" y="54" fill="#a0c4ff" fontSize="12" textAnchor="middle">+</text>
      <line x1="201" y1="50" x2="220" y2="50" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <text x="226" y="54" fill="#94a3b8" fontSize="13">≡</text>
      <line x1="240" y1="50" x2="254" y2="50" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="256" y="36" width="88" height="28" rx="3" fill="none" stroke="#7dd3fc" strokeWidth="1.5" />
      <text x="300" y="53" fill="#7dd3fc" fontSize="11" fontFamily="monospace" textAnchor="middle">G₁(s)+G₂(s)</text>
      <line x1="344" y1="50" x2="364" y2="50" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <text x="366" y="54" fill="#a0c4ff" fontSize="13" fontFamily="monospace">Y</text>
    </svg>
  );
}

function SvgFeedback() {
  return (
    <svg viewBox="0 0 380 100" width="380" height="100" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      <text x="2" y="38" fill="#a0c4ff" fontSize="13" fontFamily="monospace">R(s)</text>
      <line x1="38" y1="35" x2="55" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* sum */}
      <circle cx="64" cy="35" r="10" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="58" y="30" fill="#a0c4ff" fontSize="10">+</text>
      <text x="58" y="46" fill="#f87171" fontSize="10">−</text>
      <line x1="74" y1="35" x2="90" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* G */}
      <rect x="92" y="22" width="60" height="26" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="122" y="39" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G(s)</text>
      <line x1="152" y1="35" x2="186" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* branch */}
      <circle cx="186" cy="35" r="3" fill="#a0c4ff" />
      <line x1="186" y1="35" x2="210" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <text x="212" y="39" fill="#a0c4ff" fontSize="13" fontFamily="monospace">Y(s)</text>
      {/* feedback path */}
      <line x1="186" y1="35" x2="186" y2="75" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="186" y1="75" x2="110" y2="75" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="80" y="63" width="55" height="24" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="107" y="79" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">H(s)</text>
      <line x1="80" y1="75" x2="64" y2="75" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="64" y1="75" x2="64" y2="46" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* result */}
      <text x="248" y="28" fill="#94a3b8" fontSize="12">≡</text>
      <line x1="260" y1="35" x2="272" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="274" y="20" width="92" height="30" rx="3" fill="none" stroke="#7dd3fc" strokeWidth="1.5" />
      <text x="320" y="33" fill="#7dd3fc" fontSize="11" fontFamily="monospace" textAnchor="middle">G(s)</text>
      <text x="320" y="46" fill="#7dd3fc" fontSize="11" fontFamily="monospace" textAnchor="middle">1+G(s)H(s)</text>
    </svg>
  );
}

function SvgInnerOuter() {
  return (
    <svg viewBox="0 0 420 120" width="420" height="120" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      <text x="2" y="38" fill="#a0c4ff" fontSize="12" fontFamily="monospace">R(s)</text>
      {/* outer sum */}
      <line x1="36" y1="35" x2="50" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <circle cx="58" cy="35" r="8" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="52" y="30" fill="#a0c4ff" fontSize="9">+</text>
      <text x="52" y="44" fill="#f87171" fontSize="9">−</text>
      <line x1="66" y1="35" x2="78" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* G1 */}
      <rect x="80" y="23" width="50" height="24" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="105" y="38" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₁</text>
      <line x1="130" y1="35" x2="148" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* inner sum */}
      <circle cx="156" cy="35" r="8" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="150" y="30" fill="#a0c4ff" fontSize="9">+</text>
      <text x="150" y="44" fill="#f87171" fontSize="9">−</text>
      <line x1="164" y1="35" x2="176" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* G2 */}
      <rect x="178" y="23" width="50" height="24" rx="3" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="203" y="38" fill="#e2e8f0" fontSize="12" fontFamily="monospace" textAnchor="middle">G₂</text>
      <line x1="228" y1="35" x2="252" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <circle cx="252" cy="35" r="3" fill="#a0c4ff" />
      <text x="258" y="39" fill="#a0c4ff" fontSize="12" fontFamily="monospace">Y(s)</text>
      {/* H1 inner feedback */}
      <line x1="252" y1="35" x2="252" y2="65" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="252" y1="65" x2="190" y2="65" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="168" y="57" width="38" height="18" rx="2" fill="none" stroke="#fbbf24" strokeWidth="1.5" />
      <text x="187" y="70" fill="#fbbf24" fontSize="10" textAnchor="middle">H₁</text>
      <line x1="168" y1="65" x2="156" y2="65" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="156" y1="65" x2="156" y2="44" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* H2 outer feedback */}
      <line x1="252" y1="35" x2="252" y2="95" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="252" y1="95" x2="90" y2="95" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <rect x="68" y="87" width="38" height="18" rx="2" fill="none" stroke="#34d399" strokeWidth="1.5" />
      <text x="87" y="100" fill="#34d399" fontSize="10" textAnchor="middle">H₂</text>
      <line x1="68" y1="95" x2="58" y2="95" stroke="#a0c4ff" strokeWidth="1.5" />
      <line x1="58" y1="95" x2="58" y2="44" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
    </svg>
  );
}

function SvgSFG1() {
  return (
    <svg viewBox="0 0 400 100" width="400" height="100" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      {/* nodes */}
      {[40, 130, 220, 310, 370].map((x, i) => (
        <circle key={i} cx={x} cy={40} r={6} fill="none" stroke="#a0c4ff" strokeWidth={1.5} />
      ))}
      {/* labels */}
      {["R", "x₁", "x₂", "x₃", "Y"].map((lbl, i) => (
        <text key={i} x={[40, 130, 220, 310, 370][i]} y={25} fill="#a0c4ff" fontSize="12" fontFamily="monospace" textAnchor="middle">{lbl}</text>
      ))}
      {/* forward arrows */}
      <line x1="46" y1="40" x2="118" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="136" y1="40" x2="208" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="226" y1="40" x2="298" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="316" y1="40" x2="358" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* branch gains */}
      <text x="82" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">G₁</text>
      <text x="172" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">G₂</text>
      <text x="262" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">G₃</text>
      <text x="342" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">1</text>
      {/* -H1 feedback: x3 back to x1 */}
      <path d="M 310,46 Q 220,80 130,46" stroke="#fbbf24" strokeWidth="1.5" fill="none" markerEnd="url(#arr)" />
      <text x="220" y="80" fill="#fbbf24" fontSize="10" textAnchor="middle">−H₁</text>
      {/* -H2 feedback: x3 back to R */}
      <path d="M 310,46 Q 175,100 40,46" stroke="#f87171" strokeWidth="1.5" fill="none" markerEnd="url(#arr)" />
      <text x="175" y="100" fill="#f87171" fontSize="10" textAnchor="middle">−H₂</text>
    </svg>
  );
}

function SvgSFGSS() {
  return (
    <svg viewBox="0 0 480 110" width="480" height="110" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      {[30, 100, 160, 230, 290, 360, 430].map((x, i) => (
        <circle key={i} cx={x} cy={40} r={5} fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      ))}
      {["U", "ẋ₁", "x₁", "ẋ₂", "x₂", "x₂", "Y"].map((lbl, i) => (
        <text key={i} x={[30, 100, 160, 230, 290, 360, 430][i]} y={24} fill="#a0c4ff" fontSize="11" fontFamily="monospace" textAnchor="middle">{lbl}</text>
      ))}
      <line x1="35" y1="40" x2="89" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="105" y1="40" x2="149" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="165" y1="40" x2="219" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="235" y1="40" x2="279" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="295" y1="40" x2="349" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <line x1="365" y1="40" x2="419" y2="40" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <text x="62" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">1/C</text>
      <text x="130" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">s⁻¹</text>
      <text x="194" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">1/L</text>
      <text x="256" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">s⁻¹</text>
      <text x="322" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">1</text>
      <text x="393" y="34" fill="#7dd3fc" fontSize="10" textAnchor="middle">R</text>
      {/* −1/C: x1 → ẋ1 */}

      <text x="130" y="78" fill="#fbbf24" fontSize="10" textAnchor="middle">−1/C</text>
      {/* −R/L: x2 → ẋ2 */}

      <text x="260" y="88" fill="#f87171" fontSize="10" textAnchor="middle">−R/L</text>
    </svg>
  );
}

function SvgRLC() {
  return (
    <svg viewBox="0 0 280 130" width="280" height="130" style={{ display: "block", margin: "10px 0" }}>

      <circle cx="30" cy="65" r="18" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />

      <line x1="30" y1="20" x2="240" y2="20" stroke="#a0c4ff" strokeWidth="1.5" />

      <text x="98" y="68" fill="#7dd3fc" fontSize="11">C</text>
      <text x="55" y="40" fill="#94a3b8" fontSize="10">+</text>
      <text x="55" y="60" fill="#94a3b8" fontSize="10">vc</text>
      <text x="55" y="55" fill="#94a3b8" fontSize="10">−</text>
      {/* L branch */}
      <line x1="160" y1="20" x2="160" y2="38" stroke="#a0c4ff" strokeWidth="1.5" />
      {[42, 50, 58, 66, 74].map((y, i) => (
        <path key={i} d={`M 152,${y} Q 160,${y - 4} 168,${y} Q 160,${y + 4} 152,${y + 8}`} fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      ))}
      <line x1="160" y1="82" x2="160" y2="110" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="172" y="65" fill="#7dd3fc" fontSize="11">L</text>

      <text x="218" y="57" fill="#94a3b8" fontSize="10">v₀</text>
    </svg>
  );
}

function SvgDCMotor() {
  return (
    <svg viewBox="0 0 460 110" width="460" height="110" style={{ display: "block", margin: "10px 0" }}>
      <ArrowMarker />
      <text x="2" y="38" fill="#a0c4ff" fontSize="12" fontFamily="monospace">Va(s)</text>
      {/* sum */}
      <line x1="42" y1="35" x2="58" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      <circle cx="66" cy="35" r="8" fill="none" stroke="#a0c4ff" strokeWidth="1.5" />
      <text x="60" y="30" fill="#a0c4ff" fontSize="9">+</text>
      <text x="60" y="44" fill="#f87171" fontSize="9">−</text>
      <line x1="74" y1="35" x2="86" y2="35" stroke="#a0c4ff" strokeWidth="1.5" markerEnd="url(#arr)" />
      {/* armature */}

    a: "MATLAB:\nroots([3 10 5 0 2])\n\nRouth-Hurwitz tablosu:\ns⁴: 3    5    2\ns³: 10   0    0\ns²: 5    2    0\ns¹: −4   0\ns⁰: 2\n\nİşaret değişimleri: s²→s¹ ve s¹→s⁰ → 2 adet\n→ 2 kök sağ yarı düzlemde, 2 kök sol yarı düzlemde\n\nSistem KARARSIZ (ders slaytında cevap: kararsız)."
  },
  {
    id: 60, topic: "matlab",
    q: "Aynı sistem için K=10 ve K=100 değerlerinde basamak yanıtlarını aynı grafikte çizdiren MATLAB kodunu yaz. G(s) = K/[s(s+1)], birim geri besleme.",
    a: "figure; hold on;\n\nfor K = [10 100]\n    G = tf([K], [1 1 0]);     % K/[s(s+1)]\n    T = feedback(G, [1]);     % Kapalı döngü\n    step(T);\nend\n\nhold off;\nlegend('K=10', 'K=100')\ngrid\n\nBeklenen:\n• K=10: az sönümlü veya kritik, yavaş\n• K=100: daha az sönümlü, aşım artar\n  (ω_n = √K artar, ζ = 1/(2√K) azalır)"
  },
];

// App fonksiyonundaki "export default" kısmını çıkardık
function App() {
  const [activeTopic, setActiveTopic] = useState("all");
  const [shown, setShown] = useState({});

  const filtered = activeTopic === "all"
    ? QUESTIONS
    : QUESTIONS.filter(q => q.topic === activeTopic);

  const toggle = (id) => setShown(s => ({ ...s, [id]: !s[id] }));

  const topicColors = {
    blok: "#3b82f6", mason: "#8b5cf6", laplace: "#10b981",
    lineer: "#f59e0b", durum: "#ef4444", motor: "#06b6d4",
    duyar: "#ec4899", matlab: "#84cc16"
  };

  const topicLabel = {
    blok: "Blok", mason: "Mason", laplace: "Laplace",
    lineer: "Doğrusal", durum: "Durum", motor: "Motor",
    duyar: "Duyar", matlab: "MATLAB"
  };

  return (
    <div style={{
      background: "#0d1117",
      minHeight: "100vh",
      fontFamily: "'IBM Plex Mono', 'Fira Code', monospace",
      color: "#e2e8f0",
      padding: "0 0 60px 0"
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)",
        borderBottom: "1px solid #1e3a5f",
        padding: "28px 24px 20px",
        position: "sticky",
        top: 0,
        zIndex: 100
      }}>
        <div style={{ maxWidth: 820, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: "#64748b", letterSpacing: 3, textTransform: "uppercase" }}>KOÜ · Kontrol Sistemleri</span>
          </div>
          <h1 style={{ margin: "0 0 4px", fontSize: 22, fontWeight: 700, color: "#7dd3fc", letterSpacing: -0.5 }}>
            Vize Soru Havuzu
          </h1>
          <p style={{ margin: 0, fontSize: 12, color: "#475569" }}>
            {filtered.length} soru · {activeTopic === "all" ? "tüm konular" : TOPICS.find(t => t.id === activeTopic)?.label}
          </p>
        </div>
      </div>

      {/* Topic filter */}
      <div style={{
        maxWidth: 820, margin: "0 auto",
        padding: "16px 24px 0",
        display: "flex", flexWrap: "wrap", gap: 8
      }}>
        {TOPICS.map(t => (
          <button
            key={t.id}
            onClick={() => setActiveTopic(t.id)}
            style={{
              padding: "5px 14px",
              borderRadius: 6,
              border: activeTopic === t.id
                ? `1.5px solid ${t.id === "all" ? "#7dd3fc" : topicColors[t.id] || "#7dd3fc"}`
                : "1.5px solid #1e293b",
              background: activeTopic === t.id
                ? (t.id === "all" ? "#1e3a5f" : topicColors[t.id] + "22")
                : "transparent",
              color: activeTopic === t.id
                ? (t.id === "all" ? "#7dd3fc" : topicColors[t.id] || "#7dd3fc")
                : "#475569",
              cursor: "pointer",
              fontSize: 12,
              fontFamily: "inherit",
              transition: "all 0.15s"
            }}
          >
            {t.label}
          </button>
        ))}
      </div>

      {/* Questions */}
      <div style={{ maxWidth: 820, margin: "20px auto", padding: "0 24px", display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map((q) => (
          <div key={q.id} style={{
            background: "#0f172a",
            border: "1px solid #1e293b",
            borderRadius: 10,
            overflow: "hidden",
            transition: "border-color 0.2s"
          }}>
            {/* Question header */}
            <div style={{ padding: "16px 18px 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{
                    background: topicColors[q.topic] + "22",
                    color: topicColors[q.topic],
                    border: `1px solid ${topicColors[q.topic]}44`,
                    borderRadius: 4,
                    padding: "1px 8px",
                    fontSize: 10,
                    fontWeight: 600,
                    letterSpacing: 1,
                    textTransform: "uppercase"
                  }}>{topicLabel[q.topic]}</span>
                  <span style={{ color: "#334155", fontSize: 12 }}>#{q.id}</span>
                </div>
              </div>
              <p style={{ margin: "0 0 8px", fontSize: 14, lineHeight: 1.7, color: "#cbd5e1", whiteSpace: "pre-line" }}>{q.q}</p>
              {q.svg && q.svg}
            </div>

            {/* Answer toggle */}
            <button
              onClick={() => toggle(q.id)}
              style={{
                width: "100%",
                background: shown[q.id] ? "#1e293b" : "transparent",
                border: "none",
                borderTop: "1px solid #1e293b",
                padding: "10px 18px",
                textAlign: "left",
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                gap: 8,
                color: shown[q.id] ? "#7dd3fc" : "#475569",
                fontSize: 12,
                fontFamily: "inherit",
                transition: "all 0.2s"
              }}
            >
              <span style={{ fontSize: 14 }}>{shown[q.id] ? "▼" : "▶"}</span>
              {shown[q.id] ? "Cevabı gizle" : "Cevabı göster"}
            </button>

            {/* Answer body */}
            {shown[q.id] && (
              <div style={{
                background: "#0a0f1a",
                borderTop: "1px solid #1e293b",
                padding: "16px 18px",
              }}>
                <pre style={{
                  margin: 0,
                  fontSize: 13,
                  lineHeight: 1.75,
                  color: "#94a3b8",
                  whiteSpace: "pre-wrap",
                  wordBreak: "break-word",
                  fontFamily: "inherit"
                }}>{q.a}</pre>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// Ekrana basan fonksiyon
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
  </body>
</html>
